spring.application.name=tangled-monolith

# --- H2 (in-memory) ---
spring.datasource.url=jdbc:h2:mem:tangled;DB_CLOSE_DELAY=-1
spring.h2.console.enabled=true

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=create
# 실행되는 SQL을 보기 좋게 포맷팅해서 출력
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# SQL 바인딩 파라미터(? 에 들어가는 실제 값)까지 로그로 출력
logging.level.org.hibernate.orm.jdbc.bind=trace

# --- Spring Batch ---
# 부팅 시 등록된 Job 자동 실행 끄기 (정산 Job 은 컨트롤러에서 수동 실행)
spring.batch.job.enabled=false
# H2 에 배치 메타데이터 테이블(BATCH_JOB_*, BATCH_STEP_*) 자동 생성
spring.batch.jdbc.initialize-schema=always
# 정산 Job 의 chunk 크기 (= Reader pageSize). 바꿔가며 메모리/속도 트레이드오프 관찰
settlement.batch.chunk-size=1000

# --- [Step4] 병렬 처리 (멀티스레드 / 파티셔닝) ---
# [Step4-1] HikariCP 커넥션 풀. 동시에 도는 스레드 수보다 작으면 커넥션이 고갈돼 타임아웃 난다.
#   라이브 데모: 일부러 작게(예: 2) 걸어 터뜨린 뒤, 스레드 수에 맞춰 키워(=튜닝) 살리는 걸 보여준다.
#   주의: 무한정 키우면 이번엔 DB(max_connections)가 못 버틴다 → "풀 ↔ 스레드 ↔ DB" 균형이 핵심.
spring.datasource.hikari.maximum-pool-size=20
# 커넥션을 못 빌릴 때 기다리는 시간. 기본 30s 는 데모가 늘어지므로 3s 로 짧게 줘 빨리 터지게 한다.
spring.datasource.hikari.connection-timeout=3000
# [Step4-2] 멀티스레드 Step 의 스레드 수 / [Step4-3] 파티셔닝 gridSize 기본값.
#   (엔드포인트 ?threads= , ?gridSize= 쿼리파라미터로 호출마다 덮어쓸 수 있다)
settlement.batch.thread-count=8
settlement.batch.grid-size=8

# --- 대용량 시드 데이터 (정산 배치 실습용) ---
# true 로 켜면 부팅 시 orders/payments 테이블에 대량 주문/결제 데이터를 적재한다.
# 100만 건 OOM 데모를 하려면: --settlement.seed.enabled=true --settlement.seed.count=1000000
settlement.seed.enabled=false
settlement.seed.count=1000000
settlement.seed.batch-size=10000

# 대량 시드/배치 실행 중에는 SQL 로그가 폭주하므로 끄고 싶을 때 아래를 켠다.
# (실습 시 --spring.jpa.show-sql=false 로 덮어쓰기 권장)
