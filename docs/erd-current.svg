<svg viewBox="0 0 1500 690" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <style>
    .box { fill: #ffffff; stroke: #000000; stroke-width: 2; }
    .ttl { font-size: 26px; text-anchor: middle; }
    .lbl { font-size: 23px; text-anchor: middle; }
    .lbls{ font-size: 23px; text-anchor: start; }
    .ln  { stroke: #000000; stroke-width: 2; fill: none; }
  </style>

  <!-- ===== Boxes ===== -->
  <!-- Seller -->
  <rect class="box" x="775" y="55" width="230" height="110"/>
  <text class="ttl" x="890" y="100">셀러</text>
  <text class="ttl" x="890" y="135">(Seller)</text>

  <!-- User -->
  <rect class="box" x="1225" y="55" width="230" height="110"/>
  <text class="ttl" x="1340" y="100">유저</text>
  <text class="ttl" x="1340" y="135">(User)</text>

  <!-- Payment -->
  <rect class="box" x="35" y="225" width="230" height="110"/>
  <text class="ttl" x="150" y="270">결제</text>
  <text class="ttl" x="150" y="305">(Payment)</text>

  <!-- Order -->
  <rect class="box" x="355" y="225" width="230" height="110"/>
  <text class="ttl" x="470" y="270">주문</text>
  <text class="ttl" x="470" y="305">(Order)</text>

  <!-- Cart -->
  <rect class="box" x="1225" y="315" width="230" height="110"/>
  <text class="ttl" x="1340" y="360">장바구니</text>
  <text class="ttl" x="1340" y="395">(Cart)</text>

  <!-- OrderItem -->
  <rect class="box" x="355" y="515" width="230" height="110"/>
  <text class="ttl" x="470" y="560">주문 아이템</text>
  <text class="ttl" x="470" y="595">(OrderItem)</text>

  <!-- Product -->
  <rect class="box" x="775" y="515" width="230" height="110"/>
  <text class="ttl" x="890" y="560">상품</text>
  <text class="ttl" x="890" y="595">(Product)</text>

  <!-- CartItem -->
  <rect class="box" x="1225" y="515" width="230" height="110"/>
  <text class="ttl" x="1340" y="560">카트 아이템</text>
  <text class="ttl" x="1340" y="595">(CartItem)</text>

  <!-- ===== Edges ===== -->
  <!-- 1. Payment - Order : @OneToOne -->
  <line class="ln" x1="265" y1="280" x2="355" y2="280"/>
  <line class="ln" x1="290" y1="263" x2="290" y2="297"/>
  <line class="ln" x1="330" y1="263" x2="330" y2="297"/>
  <text class="lbl" x="310" y="255">@OneToOne</text>

  <!-- 2. Order - OrderItem : @OneToMany -->
  <line class="ln" x1="470" y1="335" x2="470" y2="515"/>
  <line class="ln" x1="453" y1="360" x2="487" y2="360"/>
  <path class="ln" d="M 455 480 L 470 515 M 470 480 L 470 515 M 485 480 L 470 515"/>
  <text class="lbls" x="485" y="430">@OneToMany</text>

  <!-- 3. OrderItem - Product : @ManyToOne -->
  <line class="ln" x1="585" y1="570" x2="775" y2="570"/>
  <path class="ln" d="M 620 570 L 585 555 M 620 570 L 585 570 M 620 570 L 585 585"/>
  <line class="ln" x1="750" y1="553" x2="750" y2="587"/>
  <text class="lbl" x="680" y="545">@ManyToOne</text>

  <!-- 4. Product - Seller : @ManyToOne / @OneToMany -->
  <line class="ln" x1="890" y1="515" x2="890" y2="165"/>
  <path class="ln" d="M 875 515 L 890 480 M 890 515 L 890 480 M 905 515 L 890 480"/>
  <line class="ln" x1="873" y1="190" x2="907" y2="190"/>
  <text class="lbls" x="905" y="330">@ManyToOne</text>
  <text class="lbls" x="905" y="360">↔ @OneToMany</text>

  <!-- 5. Seller - User : @OneToOne -->
  <line class="ln" x1="1005" y1="110" x2="1225" y2="110"/>
  <line class="ln" x1="1030" y1="93" x2="1030" y2="127"/>
  <line class="ln" x1="1200" y1="93" x2="1200" y2="127"/>
  <text class="lbl" x="1115" y="85">@OneToOne</text>

  <!-- 6. User - Cart : @OneToOne -->
  <line class="ln" x1="1340" y1="165" x2="1340" y2="315"/>
  <line class="ln" x1="1323" y1="190" x2="1357" y2="190"/>
  <line class="ln" x1="1323" y1="290" x2="1357" y2="290"/>
  <text class="lbls" x="1357" y="245">@OneToOne</text>

  <!-- 7. Cart - CartItem : @OneToMany -->
  <line class="ln" x1="1340" y1="425" x2="1340" y2="515"/>
  <line class="ln" x1="1323" y1="447" x2="1357" y2="447"/>
  <path class="ln" d="M 1325 483 L 1340 515 M 1340 483 L 1340 515 M 1355 483 L 1340 515"/>
  <text class="lbls" x="1357" y="478">@OneToMany</text>

  <!-- 8. CartItem - Product : @ManyToOne -->
  <line class="ln" x1="1225" y1="570" x2="1005" y2="570"/>
  <path class="ln" d="M 1190 570 L 1225 555 M 1190 570 L 1225 570 M 1190 570 L 1225 585"/>
  <line class="ln" x1="1030" y1="553" x2="1030" y2="587"/>
  <text class="lbl" x="1115" y="545">@ManyToOne</text>
</svg>
